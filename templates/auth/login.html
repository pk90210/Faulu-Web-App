<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In to</title>
    <link rel="icon" href="{{ url_for('static', filename='images/image.ico') }}" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0a0e1a;--surface:#111827;--border:#1e2d42;--accent:#00d4aa;--accent2:#7c6aff;--text:#e8eaf0;--muted:#6b7fa0;--red:#ff6b6b;--green:#00d4aa; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
        .bg-glow{position:fixed;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,170,0.07),transparent 70%);top:-150px;right:-100px;pointer-events:none;}
        .bg-glow2{position:fixed;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(124,106,255,0.07),transparent 70%);bottom:-100px;left:-100px;pointer-events:none;}
        .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:420px;position:relative;z-index:5;}
        .brand{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;}
        .auth-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-bottom:4px;letter-spacing:-0.5px;}
        .auth-subtitle{color:var(--muted);font-size:14px;margin-bottom:28px;}
        .form-group{margin-bottom:16px;}
        label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
        input{width:100%;background:#1a2235;border:1px solid var(--border);border-radius:8px;color:var(--text);padding:11px 14px;font-size:14px;font-family:'DM Sans',sans-serif;transition:border-color 0.2s;}
        input:focus{outline:none;border-color:var(--accent);}
        .btn{width:100%;padding:12px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0a0e1a;margin-top:8px;transition:all 0.2s;}
        .btn:hover{opacity:0.9;transform:translateY(-1px);}
        .auth-link{text-align:center;margin-top:20px;font-size:13px;color:var(--muted);}
        .auth-link a{color:var(--accent);text-decoration:none;font-weight:600;}
        .flash{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;}
        .flash.error{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);color:var(--red);}
        .flash.success{background:rgba(0,212,170,0.1);border:1px solid rgba(0,212,170,0.3);color:var(--green);}
        .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:12px;}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
        .back-link{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;margin-bottom:24px;transition:color 0.2s;}
        .back-link:hover{color:var(--text);}
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow2"></div>
    <div class="auth-card">
        <a href="{{ url_for('auth.index') }}" class="back-link">← Back to home</a>
        <div class="brand">Faulu Finance</div>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to manage your finances</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Sign In →</button>
        </form>

        <div class="divider">or</div>
        <div class="auth-link">Don't have an account? <a href="{{ url_for('auth.register') }}">Create one free</a></div>
    </div>
</body>
</html>
